<script>
	// 1. Define the function to sync PaperMod's attribute with the system
	function syncTheme() {
		// Only sync if the user hasn't manually set a preference via the toggle
		if (!localStorage.getItem("pref-theme")) {
			if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
				document.querySelector("html").dataset.theme = "dark";
			} else {
				document.querySelector("html").dataset.theme = "light";
			}
		}
	}

	// 2. Listen for the system theme change event
	window
		.matchMedia("(prefers-color-scheme: dark)")
		.addEventListener("change", syncTheme);

	// 3. Optional: Clear preference if it matches the new system theme
	// to allow 'auto' to take back control
	window.matchMedia("(prefers-color-scheme: dark)").addListener(function (e) {
		syncTheme();
	});
	const faviconTag = document.querySelector('link[rel="icon"]');
	const isDark = window.matchMedia("(prefers-color-scheme: dark)");

	function changeFavicon() {
		if (isDark.matches) {
			faviconTag.href = "/favicon-dark.ico";
		} else {
			faviconTag.href = "/favicon-light.ico";
		}
	}

	// Run it initially and listen for theme changes
	changeFavicon();
	isDark.addEventListener("change", changeFavicon);
</script>
